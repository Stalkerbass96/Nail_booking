services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nail_booking}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nail_booking}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-nail_booking}?schema=public
      CRON_SECRET: ${CRON_SECRET:-change-me-cron-secret}
      ADMIN_AUTH_SECRET: ${ADMIN_AUTH_SECRET:-change-me-admin-secret}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-change-me-admin-password}
      AUTO_CANCEL_INTERVAL_MS: ${AUTO_CANCEL_INTERVAL_MS:-300000}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-}
      LINE_AUTO_REPLY_TEXT: ${LINE_AUTO_REPLY_TEXT:-Message received. The salon owner will reply to you shortly.}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"

  auto-cancel-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-nail_booking}?schema=public
      CRON_SECRET: ${CRON_SECRET:-change-me-cron-secret}
      ADMIN_AUTH_SECRET: ${ADMIN_AUTH_SECRET:-change-me-admin-secret}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-change-me-admin-password}
      AUTO_CANCEL_INTERVAL_MS: ${AUTO_CANCEL_INTERVAL_MS:-300000}
    command: ["node", "scripts/auto-cancel-loop.cjs"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

services:
  postgres:
    image: postgres:16
    container_name: nail-booking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nail_booking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nail_booking"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nail-booking-app
    restart: unless-stopped
    env_file:
      - .env.deploy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nail_booking?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  auto-cancel-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nail-booking-auto-cancel
    restart: unless-stopped
    env_file:
      - .env.deploy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nail_booking?schema=public
      AUTO_CANCEL_INTERVAL_MS: "300000"
    command: ["node", "scripts/auto-cancel-loop.cjs"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
